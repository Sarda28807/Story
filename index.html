<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nandini — A Story Between Shadows & Love</title>
    <meta name="description" content="A hauntingly romantic story told through the days of Nandini's life — where love meets the unknown.">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- 3D Shapes Canvas -->
    <canvas id="shapesCanvas"></canvas>

    <!-- Ambient Particles -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- Candle Glows -->
    <div class="candle-glow left"></div>
    <div class="candle-glow right"></div>

    <!-- Main Wrapper -->
    <div class="story-wrapper">

        <!-- ═══════ HEADER ═══════ -->
        <header class="story-header">
            <div class="header-icon">
                <i data-lucide="skull"></i>
                <div class="header-divider"></div>
                <i data-lucide="heart"></i>
                <div class="header-divider"></div>
                <i data-lucide="ghost"></i>
            </div>
            <h1 class="story-title">Nandini</h1>
            <p class="story-subtitle">a tale between shadows & love</p>
            <div class="header-ornament">
                <div class="ornament-line"></div>
                <div class="ornament-icon"><i data-lucide="moon"></i></div>
                <div class="ornament-line"></div>
            </div>
        </header>

        <!-- ═══════ BOOK ═══════ -->
        <div class="book-container">
            <div class="book" id="book">
                <!-- Content populated from storyData.js -->
            </div>
        </div>

        <!-- ═══════ PAGE NAVIGATION ═══════ -->
        <nav class="page-nav" id="pageNav">
            <button class="nav-btn" id="prevBtn" onclick="prevPage()" disabled>
                <i data-lucide="chevron-left"></i>
                <span>Previous</span>
            </button>
            <div class="page-indicator" id="pageIndicator"></div>
            <button class="nav-btn" id="nextBtn" onclick="nextPage()">
                <span>Next</span>
                <i data-lucide="chevron-right"></i>
            </button>
        </nav>

        <!-- ═══════ FOOTER ═══════ -->
        <footer class="story-footer">
            <div class="footer-ornament">
                <div class="fo-line"></div>
                <i data-lucide="heart"></i>
                <div class="fo-line"></div>
            </div>
            <p class="footer-text">A STORY WRITTEN WITH LOVE & A LITTLE FEAR</p>
            <p class="footer-credit">~ for Nandini, always ~</p>
        </footer>

    </div>

    <!-- ═══════ JAVASCRIPT ═══════ -->
    <!-- Firebase core & Firestore SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <script src="storyData.js"></script>
    <script src="script.js"></script>

</body>
</html>
